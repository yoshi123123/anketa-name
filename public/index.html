<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANKETA.FORUM</title>
<link rel="icon" type="image/png" href="/favicon.jpg">
<link rel="shortcut icon" href="/favicon.jpg">
<link rel="apple-touch-icon" href="/favicon.jpg">
<meta property="og:title" content="ANKETA.FORUM">
<meta property="og:description" content="Анонимные анкеты и форум">
<meta property="og:image" content="/favicon.jpg">
<meta property="og:type" content="website">
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0d0d0f; --bg2:#141416; --bg3:#1a1a1e;
  --card:#1e1e24; --card2:#252530;
  --border:#2d2d3a; --border2:#383848;
  --accent:#e8632a; --accent-h:#f07540; --accent2:#5865f2;
  --green:#3ba55d; --red:#ed4245; --yellow:#faa61a;
  --text:#dcddde; --text2:#b9bbbe; --muted:#72767d;
  --white:#fff; --font:'Inter',sans-serif;
  --r:6px; --r2:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.page-wrap{display:flex;flex-direction:column;min-height:100vh}
.main-layout{display:flex;flex:1;max-width:1200px;margin:0 auto;width:100%;padding:16px;gap:16px}
.sidebar{width:220px;flex-shrink:0}
.content{flex:1;min-width:0}
.right-sidebar{width:200px;flex-shrink:0}

.site-header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.header-inner{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px;height:48px}
.site-logo{font-size:17px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;text-decoration:none;letter-spacing:-.3px}
.site-logo .dot{color:var(--accent)}
.header-nav{display:flex;gap:2px;flex:1;align-items:center;padding-left:8px}
.hnav-btn{padding:5px 12px;border-radius:var(--r);background:transparent;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s}
.hnav-btn:hover,.hnav-btn.active{background:var(--card);color:var(--white)}
.header-search{flex:1;max-width:280px;position:relative}
.header-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:6px 12px 6px 32px;font-size:13px}
.header-search input::placeholder{color:var(--muted)}
.header-search input:focus{border-color:var(--accent)}
.hsearch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hbtn{padding:5px 14px;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s}
.hbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.hbtn-ghost:hover{border-color:var(--border2);color:var(--white)}
.hbtn-accent{background:var(--accent);color:#fff}
.hbtn-accent:hover{background:var(--accent-h)}
.user-btn{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:20px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.user-btn:hover{border-color:var(--border2)}
.user-av-emoji{width:28px;height:28px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.user-name-chip{font-size:13px;font-weight:600;color:var(--white)}
.role-chip{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.5px}
.role-owner{background:#ed424520;color:var(--red);border:1px solid #ed424540}
.role-admin{background:#ed424520;color:var(--red);border:1px solid #ed424540}
.role-mod{background:#faa61a20;color:var(--yellow);border:1px solid #faa61a40}
.role-user{background:#5865f220;color:var(--accent2);border:1px solid #5865f240}

.udrop{position:fixed;top:50px;right:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);min-width:180px;z-index:300;overflow:hidden;display:none;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.udrop.open{display:flex}
.udrop-head{padding:10px 14px;border-bottom:1px solid var(--border)}
.udrop-uname{font-weight:700;font-size:13px;color:var(--white)}
.udrop-sub{font-size:11px;color:var(--muted)}
.udrop-item{padding:9px 14px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;background:none;text-align:left;width:100%;transition:background .1s}
.udrop-item:hover{background:var(--card2)}
.udrop-item.red{color:var(--red)}
.udrop-sep{height:1px;background:var(--border);margin:3px 0}

.sidebar-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;overflow:hidden}
.sb-title{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;background:none;border:none;width:100%;text-align:left}
.sb-nav-item:hover,.sb-nav-item.active{background:var(--card2);color:var(--white)}
.sb-nav-item.active{border-left:3px solid var(--accent)}
.sb-nav-item .icon{font-size:15px;width:18px;text-align:center}

.page-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

.profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .15s;position:relative}
.pcard:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px)}
.pcard-pin{position:absolute;top:8px;right:8px;font-size:11px;color:var(--yellow)}
.pcard-admin-actions{position:absolute;top:8px;right:8px;display:none;gap:5px;z-index:10}
.pcard:hover .pcard-admin-actions{display:flex}
.pcard-admin-btn{width:28px;height:28px;border-radius:8px;background:rgba(20,20,24,.92);border:1px solid var(--border2);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.pcard-admin-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.pcard-admin-btn.danger:hover{border-color:var(--red);color:var(--red)}
.pcard.is-hidden{opacity:.55;filter:grayscale(.35)}
.admin-badge-mini{position:absolute;left:8px;top:8px;font-size:10px;background:#ed424520;color:var(--red);border:1px solid #ed424540;padding:1px 6px;border-radius:4px;z-index:9}
.quick-admin-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.quick-admin-panel .hint{font-size:12px;color:var(--muted);margin-right:auto}

.pcard-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.pcard-av{width:44px;height:44px;border-radius:50%;background:var(--card2);flex-shrink:0;font-size:20px;display:flex;align-items:center;justify-content:center}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-weight:700;font-size:14px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.pcard-meta{font-size:11px;color:var(--muted);margin-bottom:5px}
.pcard-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 7px;border-radius:3px;background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.pcard-bio{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:4px 12px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .12s}
.filter-pill:hover,.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.thread-list{display:flex;flex-direction:column;gap:2px}
.thread-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .12s;position:relative}
.thread-row:hover{background:var(--card2);border-color:var(--border2)}
.thread-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--card2)}
.thread-info{flex:1;min-width:0}
.thread-title{font-weight:600;font-size:13px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.thread-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:10px}
.thread-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.thread-replies{font-size:11px;color:var(--muted)}
.thread-pinned{color:var(--yellow);font-size:11px}
.thread-row .thread-admin-actions{display:none;gap:4px;margin-left:8px}
.thread-row:hover .thread-admin-actions{display:flex}

.fgroup{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.finput,.ftextarea,.fselect{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:8px 12px;font-size:13px;transition:border-color .15s}
.finput:focus,.ftextarea:focus,.fselect:focus{border-color:var(--accent)}
.finput::placeholder,.ftextarea::placeholder{color:var(--muted)}
.ftextarea{resize:vertical;min-height:80px;line-height:1.6}
.form-row{display:flex;gap:10px}
.form-row .fgroup{flex:1}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2);color:var(--white)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-block{width:100%;justify-content:center}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;visibility:hidden;opacity:0;pointer-events:none;transition:all .2s}
.overlay.open{visibility:visible;opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:mslide .2s ease}
.modal-lg{max-width:720px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700;color:var(--white)}
.modal-close{width:28px;height:28px;border-radius:var(--r);background:var(--card2);border:1px solid var(--border);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:18px}
@keyframes mslide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin:-18px -18px 18px}
.atab{flex:1;padding:12px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.atab:hover{color:var(--text)}
.atab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-panel{display:none}
.auth-panel.active{display:block}
.auth-err{font-size:12px;color:var(--red);min-height:16px;margin-bottom:8px}

.profile-header-modal{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px}
.pm-av{width:72px;height:72px;border-radius:50%;background:var(--card2);font-size:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pm-info{flex:1}
.pm-name{font-size:20px;font-weight:700;color:var(--white);margin-bottom:2px}
.pm-sub{font-size:12px;color:var(--muted);margin-bottom:8px}
.pm-tags{display:flex;gap:5px;flex-wrap:wrap}
.section-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:16px;display:flex;align-items:center;gap:6px}
.about-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}

.comment-item{display:flex;gap:8px;margin-bottom:12px}
.cm-av{width:32px;height:32px;border-radius:50%;background:var(--card2);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1px solid var(--border)}
.cm-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.cm-av img.broken{display:none}
.cm-av-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:15px}
.cm-av.anon-admin{background:#ed424520;border-color:#ed424540}
.cm-bubble{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:0 var(--r2) var(--r2) var(--r2);padding:8px 12px;min-width:0}
.cm-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.cm-name{font-size:12px;font-weight:700;color:var(--white)}
.cm-name.anon{color:var(--red)}
.cm-time{font-size:11px;color:var(--muted)}
.cm-anon-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#ed424520;color:var(--red);border:1px solid #ed424540;font-weight:700;letter-spacing:.3px}
.cm-text{font-size:13px;color:var(--text2);line-height:1.55;white-space:pre-wrap;word-break:break-word}
.cm-actions{display:flex;gap:6px;margin-top:5px}
.cm-act{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:3px;transition:all .12s}
.cm-act:hover{background:var(--card);color:var(--text)}
.cm-act.red:hover{color:var(--red)}
.comment-input-row{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
@media(max-width:600px){
  .comment-item{gap:6px}
  .cm-av{width:28px;height:28px;font-size:13px}
  .cm-bubble{padding:7px 10px}
  .cm-text{font-size:12px}
}
.comment-field-wrap{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .15s}
.comment-field-wrap:focus-within{border-color:var(--accent)}
.comment-field{width:100%;background:transparent;border:none;color:var(--text);padding:8px 12px;font-size:13px;resize:none;min-height:36px;max-height:120px;line-height:1.5}
.comment-field::placeholder{color:var(--muted)}
.comment-send{width:32px;height:32px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-bottom:2px}
.comment-send:hover{background:var(--accent-h);transform:scale(1.05)}

.thread-post{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden}
.tp-head{display:flex;gap:0;border-bottom:1px solid var(--border)}
.tp-sidebar{width:120px;flex-shrink:0;padding:14px;border-right:1px solid var(--border);text-align:center}
.tp-av{width:52px;height:52px;border-radius:50%;margin:0 auto 6px;background:var(--card2);font-size:24px;display:flex;align-items:center;justify-content:center}
.tp-username{font-size:12px;font-weight:700;color:var(--white);word-break:break-all}
.tp-role{font-size:10px;color:var(--muted);margin-top:2px}
.tp-body{flex:1;padding:14px;min-width:0}
.tp-meta{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tp-content{font-size:14px;color:var(--text);line-height:1.75;white-space:pre-wrap;word-wrap:break-word}
.tp-actions{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 20px;border-radius:100px;z-index:1000;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.warn{border-color:var(--yellow);color:var(--yellow)}

.admin-wrap{padding:4px 0}
.admin-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.astat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.astat-n{font-size:24px;font-weight:700;margin-bottom:2px}
.astat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.atabs{display:flex;gap:2px;margin-bottom:12px;background:var(--bg3);border-radius:var(--r);padding:3px;width:fit-content;flex-wrap:wrap}
.atab2{padding:6px 14px;border-radius:var(--r);font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .12s}
.atab2.active{background:var(--card);color:var(--white)}
.atable-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.atable{width:100%;border-collapse:collapse}
.atable th{background:var(--bg3);color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);font-weight:600}
.atable td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.atable tr:last-child td{border-bottom:none}
.atable tr{background:var(--card)}
.atable tr:hover{background:var(--card2)}
.td-actions{display:flex;gap:4px;flex-wrap:wrap}
.act-btn{padding:3px 9px;border-radius:var(--r);border:1px solid var(--border);background:none;color:var(--text2);font-size:11px;cursor:pointer;transition:all .12s;font-family:var(--font)}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}
.act-btn.d:hover{border-color:var(--red);color:var(--red)}
.act-btn.g:hover{border-color:var(--green);color:var(--green)}
.act-btn.y:hover{border-color:var(--yellow);color:var(--yellow)}
.role-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:11px;padding:3px 6px;border-radius:4px;cursor:pointer}
.confirm-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;max-width:340px;width:100%;text-align:center}
.confirm-icon{font-size:32px;margin-bottom:8px}
.confirm-title{font-weight:700;font-size:15px;color:var(--white);margin-bottom:6px}
.confirm-txt{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;white-space:pre-line}
.confirm-btns{display:flex;gap:8px;justify-content:center}

.empty-state{text-align:center;padding:48px 16px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:10px;opacity:.5}
.empty-state h3{font-size:15px;color:var(--text);margin-bottom:4px}

.site-editor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* ══ USER PROFILE PAGE ══ */
.uprofile-banner{width:100%;height:160px;background:linear-gradient(135deg,var(--card2),var(--bg3));border-radius:var(--r2) var(--r2) 0 0;overflow:hidden;position:relative;cursor:pointer}
.uprofile-banner img{width:100%;height:100%;object-fit:cover}
.uprofile-banner-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:24px}
.uprofile-banner:hover .uprofile-banner-overlay{opacity:1}
.uprofile-head{background:var(--card);border:1px solid var(--border);border-radius:0 0 var(--r2) var(--r2);padding:0 20px 20px;margin-bottom:14px}
.uprofile-av-wrap{margin-top:-36px;margin-bottom:10px;position:relative;display:inline-block}
.uprofile-av{width:72px;height:72px;border-radius:50%;border:3px solid var(--card);background:var(--card2);font-size:28px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.uprofile-av img{width:100%;height:100%;object-fit:cover}
.uprofile-av-edit{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--card);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer}
.uprofile-name{font-size:20px;font-weight:800;color:var(--white);margin-bottom:2px}
.uprofile-handle{font-size:13px;color:var(--muted);margin-bottom:8px}
.uprofile-status{font-size:13px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.uprofile-status::before{content:'●';color:var(--green);font-size:8px}
.uprofile-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.uprofile-meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.uprofile-bio{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.uprofile-socials{display:flex;gap:8px;flex-wrap:wrap}
.social-link{padding:4px 12px;border-radius:var(--r);background:var(--card2);border:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .12s;cursor:pointer;text-decoration:none}
.social-link:hover{border-color:var(--accent);color:var(--accent)}
.uprofile-stats{display:flex;gap:2px;margin-bottom:14px}

/* ══ FRIENDS ══ */
.friend-btn{padding:8px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.friend-btn-add{background:var(--accent);color:#fff}.friend-btn-add:hover{background:var(--accent-h)}
.friend-btn-pending{background:var(--card2);color:var(--yellow);border:1px solid var(--yellow)40}
.friend-btn-accept{background:var(--green);color:#fff}
.friend-btn-friends{background:var(--card2);color:var(--green);border:1px solid var(--green)40}
.friend-btn-blocked{background:var(--card2);color:var(--red);border:1px solid var(--red)40}
.friend-actions-drop{position:relative;display:inline-block}
.friend-actions-menu{position:absolute;top:calc(100%+4px);right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);min-width:180px;z-index:50;overflow:hidden;display:none;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.friend-actions-menu.open{display:flex}
.friend-menu-item{padding:9px 14px;font-size:13px;color:var(--text);background:none;border:none;text-align:left;cursor:pointer;transition:background .1s;width:100%}
.friend-menu-item:hover{background:var(--card2)}
.friend-menu-item.red{color:var(--red)}

.friends-list{display:flex;flex-direction:column;gap:6px}
.friend-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:background .12s}
.friend-row:hover{background:var(--card2)}
.friend-av{width:38px;height:38px;border-radius:50%;background:var(--card2);font-size:17px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.friend-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:13px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.friend-sub{font-size:11px;color:var(--muted)}
.friend-badge-count{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px;min-width:20px;text-align:center}

.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);position:absolute;top:2px;right:2px;display:none}
.notif-dot.show{display:block}
.uprofile-stat{flex:1;text-align:center;padding:10px;background:var(--bg3);border-radius:var(--r)}
.uprofile-stat-n{font-size:18px;font-weight:700;color:var(--white)}
.uprofile-stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.author-link{cursor:pointer;font-weight:700;color:var(--white);transition:color .12s}
.author-link:hover{color:var(--accent)}
.avatar-upload-wrap{position:relative;display:inline-block;cursor:pointer}
.avatar-upload-wrap:hover .avatar-overlay{opacity:1}
.avatar-img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
.avatar-img-sm{width:32px;height:32px;border-radius:50%;object-fit:cover}
.avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transition:opacity .15s}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin:10px 0}
.photo-item{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:1;background:var(--bg3);cursor:pointer}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.photo-item:hover img{transform:scale(1.05)}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.7);border:none;color:#fff;font-size:12px;cursor:pointer;
  display:none;align-items:center;justify-content:center}
.photo-item:hover .photo-del{display:flex}
.photo-add-btn{border:2px dashed var(--border2);border-radius:var(--r);aspect-ratio:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:var(--muted);font-size:11px;cursor:pointer;background:none;transition:all .15s}
.photo-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.photo-add-btn .ico{font-size:22px}
.photo-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:900;
  display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.photo-lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--r)}
.cm-image{max-width:260px;max-height:240px;border-radius:var(--r);margin-top:6px;cursor:zoom-in;display:block}
.post-image{max-width:420px;max-height:360px;border-radius:var(--r);margin-top:8px;cursor:zoom-in;display:block}
.img-attach-preview{position:relative;display:inline-block;margin-top:6px}
.img-attach-preview img{height:60px;border-radius:var(--r);border:1px solid var(--border)}
.img-attach-preview .rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
  background:var(--red);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-btn{padding:5px 10px;border-radius:var(--r);border:1px solid var(--border);background:none;
  color:var(--muted);font-size:13px;cursor:pointer;transition:all .12s}
.img-btn:hover{border-color:var(--accent);color:var(--accent)}
/* ══ BOTTOM NAV (mobile) ══ */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  z-index:300;padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav-inner{display:flex;height:56px}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;
  letter-spacing:.3px;transition:color .15s;padding:0;cursor:pointer;
}
.bnav-btn .bico{font-size:20px;line-height:1}
.bnav-btn.active,.bnav-btn:active{color:var(--accent)}

/* ══ TABLET ══ */
@media(max-width:900px){
  .sidebar,.right-sidebar{display:none}
  .main-layout{padding:10px}
  .header-search{display:none}
}

/* ══ MOBILE ══ */
@media(max-width:600px){
  /* header */
  .site-header{height:auto}
  .header-inner{height:50px;padding:0 12px;gap:8px}
  .header-nav{display:none}                   /* убрать — заменяет bottom nav */
  .header-search{display:none}
  .hbtn-ghost:not(.mob-show){display:none}    /* убрать лишние кнопки */

  /* user chip — только эмодзи */
  .user-name-chip,.role-chip{display:none}
  .user-btn{padding:4px;border-radius:50%}

  /* layout */
  .main-layout{padding:8px 8px 72px;gap:10px} /* 72px = bottom nav */

  /* profiles grid */
  .profiles-grid{grid-template-columns:1fr}

  /* cards — крупнее для пальца */
  .pcard{padding:12px}
  .pcard-av{width:40px;height:40px;font-size:18px}

  /* thread rows */
  .thread-row{padding:10px 12px}
  .thread-icon{width:32px;height:32px;font-size:16px}

  /* modals — полный экран снизу */
  .overlay{align-items:flex-end;padding:0}
  .modal{
    border-radius:var(--r2) var(--r2) 0 0;
    max-width:100%;max-height:92vh;
    animation:mslide-mob .25s ease;
  }
  @keyframes mslide-mob{from{transform:translateY(100%)}to{transform:translateY(0)}}

  /* admin stats grid */
  .admin-stat-grid{grid-template-columns:repeat(2,1fr)}

  /* site editor */
  .site-editor-grid{grid-template-columns:1fr}

  /* forum thread sidebar — убрать на мобиле */
  .tp-sidebar{display:none}

  /* кнопки формы — во всю ширину */
  .btn-block{width:100%;justify-content:center}

  /* confirm box — во всю ширину снизу */
  .confirm-box{max-width:100%;border-radius:var(--r2) var(--r2) 0 0}

  /* атабы — скролл */
  .atabs{overflow-x:auto;flex-wrap:nowrap;width:100%}

  /* показать bottom nav */
  .bottom-nav{display:block}

  /* toast — выше bottom nav */
  .toast{bottom:72px}

  /* поиск в мобиле — в контенте */
  .mob-search-wrap{display:block;margin-bottom:10px}
  .mob-search-wrap input{
    width:100%;background:var(--bg3);border:1px solid var(--border);
    border-radius:var(--r);color:var(--text);padding:8px 12px 8px 34px;
    font-size:14px;
  }
  .mob-search-wrap input:focus{border-color:var(--accent)}
  .mob-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}

  /* quick-admin-panel — вертикально */
  .quick-admin-panel{flex-direction:column;align-items:stretch;gap:6px}
  .quick-admin-panel .hint{margin-right:0}

  /* thread-admin-actions всегда видны (hover не работает на тач) */
  .thread-row .thread-admin-actions{display:flex}
  .pcard-admin-actions{display:flex}

  /* profile modal body */
  .profile-header-modal{flex-direction:column;align-items:center;text-align:center}
  .pm-info{text-align:center}

  /* finput — размер шрифта 16px чтобы не зумилось на iOS */
  .finput,.ftextarea,.fselect{font-size:16px}
}

/* ══ ОЧЕНЬ МАЛЕНЬКИЕ (≤380px) ══ */
@media(max-width:380px){
  .astat-n{font-size:20px}
  .pcard-name{font-size:13px}
}

.switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.switch input{display:none}
.switch .slider{width:34px;height:18px;background:var(--border2);border-radius:18px;position:relative;transition:background .15s}
.switch .slider::after{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s}
.switch input:checked + .slider{background:var(--accent)}
.switch input:checked + .slider::after{transform:translateX(16px)}
</style>
</head>
<body>
<div class="page-wrap">

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" onclick="nav('home')"><span id="hdrLogo">ANKETA</span><span class="dot">.</span><span>FORUM</span></a>
    <nav class="header-nav">
      <button class="hnav-btn" id="navHome" onclick="nav('home')">Анкеты</button>
      <button class="hnav-btn" id="navForum" onclick="nav('forum')">Форум</button>
    </nav>
    <div class="header-search">
      <span class="hsearch-icon">🔍</span>
      <input type="text" id="globalSearch" placeholder="Поиск..." oninput="render()">
    </div>
    <div class="header-right" id="hdrRight"></div>
  </div>
</header>

<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-block">
      <div class="sb-title">Меню</div>
      <button class="sb-nav-item" onclick="nav('home')"><span class="icon">🏠</span>Анкеты</button>
      <button class="sb-nav-item" onclick="nav('forum')"><span class="icon">💬</span>Форум</button>
      <button class="sb-nav-item" onclick="requireAuth(()=>nav('create'))"><span class="icon">➕</span>Моя анкета</button>
    </div>
    <div class="sidebar-block">
      <div class="sb-title">Статистика</div>
      <div style="padding:10px 14px;font-size:12px;color:var(--text2)" id="statsBox">
        <div>👥 <span id="sUsers">0</span> участников</div>
        <div>📝 <span id="sProfiles">0</span> анкет</div>
        <div>💬 <span id="sTopics">0</span> тем</div>
      </div>
    </div>
  </aside>

  <main class="content" id="mainContent"></main>

  <aside class="right-sidebar">
    <div class="sidebar-block">
      <div class="sb-title">Информация</div>
      <div style="padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6" id="welcomeBox"></div>
    </div>
  </aside>
</div>
</div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn" id="bnavHome" onclick="nav('home')">
      <span class="bico">🏠</span>Анкеты
    </button>
    <button class="bnav-btn" id="bnavForum" onclick="nav('forum')">
      <span class="bico">💬</span>Форум
    </button>
    <button class="bnav-btn" id="bnavCreate" onclick="requireAuth(()=>nav('create'))">
      <span class="bico">➕</span>Создать
    </button>
    <button class="bnav-btn" id="bnavFriends" onclick="requireAuth(openFriendsModal)" style="position:relative">
      <span class="bico">👥</span>Друзья
      <span class="notif-dot" id="friendsNotifDot"></span>
    </button>
    <button class="bnav-btn" id="bnavProfile" onclick="onMobProfile()">
      <span class="bico" id="bnavProfileIco">👤</span>
      <span id="bnavProfileLbl">Войти</span>
    </button>
  </div>
</nav>

<!-- USER PROFILE MODAL -->
<div class="overlay" id="userProfileOverlay">
  <div class="modal modal-lg">
    <div class="modal-head"><div class="modal-title" id="userProfileTitle">Профиль</div><button class="modal-close" onclick="closeUserProfile()">✕</button></div>
    <div class="modal-body" id="userProfileBody" style="padding:0"></div>
  </div>
</div>

<div class="overlay" id="authOverlay">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Вход / регистрация</div><button class="modal-close" onclick="closeAuth()">✕</button></div>
    <div class="modal-body">
      <div class="auth-tabs">
        <button class="atab active" id="atLogin" onclick="authTab('login')">Войти</button>
        <button class="atab" id="atReg" onclick="authTab('reg')">Регистрация</button>
      </div>

      <div class="auth-panel active" id="apLogin">
        <div class="auth-err" id="loginErr"></div>
        <div class="fgroup">
          <label class="flabel">Логин</label>
          <input class="finput" id="liUser" placeholder="логин">
        </div>
        <div class="fgroup">
          <label class="flabel">Пароль</label>
          <input class="finput" id="liPass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary btn-block" onclick="doLogin()">Войти</button>
      </div>

      <div class="auth-panel" id="apReg">
        <div class="auth-err" id="regErr"></div>
        <div class="fgroup">
          <label class="flabel">Логин (3-20 символов, латиница)</label>
          <input class="finput" id="rUser" placeholder="my_login" maxlength="20">
        </div>
        <div class="fgroup">
          <label class="flabel">Отображаемое имя</label>
          <input class="finput" id="rDisp" placeholder="Как тебя видят" maxlength="30">
        </div>
        <div class="fgroup">
          <label class="flabel">Пароль (мин. 6 символов)</label>
          <input class="finput" id="rPass" type="password" placeholder="••••••">
        </div>
        <div class="fgroup">
          <label class="flabel">Повтори пароль</label>
          <input class="finput" id="rPass2" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <button class="btn btn-primary btn-block" onclick="doRegister()">Создать аккаунт</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Настройки профиля</div><button class="modal-close" onclick="closeSettings()">✕</button></div>
    <div class="modal-body" id="settingsBody"></div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="overlay" id="profileOverlay">
  <div class="modal modal-lg">
    <div class="modal-head"><div class="modal-title">Анкета</div><button class="modal-close" onclick="closeProfile()">✕</button></div>
    <div class="modal-body" id="profileBody"></div>
  </div>
</div>

<!-- TOPIC MODAL -->
<div class="overlay" id="topicOverlay">
  <div class="modal modal-lg">
    <div class="modal-head"><div class="modal-title">Тема</div><button class="modal-close" onclick="closeTopic()">✕</button></div>
    <div class="modal-body" id="topicBody"></div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="overlay" id="adminOverlay">
  <div class="modal modal-lg">
    <div class="modal-head"><div class="modal-title">⚙ Админ-панель</div><button class="modal-close" onclick="closeAdmin()">✕</button></div>
    <div class="modal-body" id="adminBody"></div>
  </div>
</div>

<!-- SITE EDITOR MODAL -->
<div class="overlay" id="siteEditorOverlay">
  <div class="modal modal-lg">
    <div class="modal-head"><div class="modal-title">🛠 Live-редактор сайта</div><button class="modal-close" onclick="closeSiteEditor()">✕</button></div>
    <div class="modal-body" id="siteEditorBody"></div>
  </div>
</div>

<!-- FRIENDS MODAL -->
<div class="overlay" id="friendsOverlay">
  <div class="modal modal-lg">
    <div class="modal-head">
      <div class="modal-title">👥 Друзья</div>
      <button class="modal-close" onclick="document.getElementById('friendsOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="friendsBody"></div>
  </div>
</div>

<!-- DM CHAT -->
<div class="overlay" id="dmOverlay">
  <div class="modal modal-lg" style="display:flex;flex-direction:column;height:80vh;max-height:600px">
    <div class="modal-head">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('dmOverlay').classList.remove('open');friendsTab='chats';openFriendsModal()" style="margin-right:8px">←</button>
      <div class="modal-title" id="dmTitle">💬 Чат</div>
      <button class="modal-close" onclick="document.getElementById('dmOverlay').classList.remove('open')">✕</button>
    </div>
    <div id="dmMessages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px"></div>
    <div style="padding:12px;border-top:1px solid var(--border);display:flex;gap:8px">
      <input id="dmInput" class="input" placeholder="Сообщение..." style="flex:1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDm()}">
      <button class="btn btn-primary" onclick="sendDm()">➤</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon" id="cfIcon">⚠️</div>
    <div class="confirm-title" id="cfTitle"></div>
    <div class="confirm-txt" id="cfTxt"></div>
    <div class="confirm-btns">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">Отмена</button>
      <button class="btn btn-danger btn-sm" id="cfOk">Подтвердить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════
let curUser = null;
let curPage = 'home';
let profiles = [];
let topics = [];
let curProfile = null;       // {profile, comments}
let curTopic = null;         // {topic, posts}
let siteSettings = { siteName:'ANKETA.FORUM', welcome:'Анонимные анкеты и форум', accent:'#e8632a' };

const ROLE_LABELS = { owner:'ГЛАВ АДМИН', admin:'АДМИН', moderator:'МОДЕРАТОР', user:'USER' };
const ROLE_RANK   = { user:0, moderator:1, admin:2, owner:3 };
const rolerank = u => ROLE_RANK[u?.role] ?? 0;
const isOwner = () => curUser?.role === 'owner';
const isAdmin = () => rolerank(curUser) >= 2;
const isMod   = () => rolerank(curUser) >= 1;

// ════════════════════════════════════════════════════════════════════
//  API CLIENT
// ════════════════════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const init = { method: opts.method || 'GET', credentials: 'include', headers: { 'Content-Type':'application/json' } };
  if (opts.body) init.body = JSON.stringify(opts.body);
  const res = await fetch('/api' + path, init);
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data.error || 'Ошибка ' + res.status);
  return data;
}

// ════════════════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════════════════
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'только что';
  if (s < 3600) return Math.floor(s/60) + ' мин назад';
  if (s < 86400) return Math.floor(s/3600) + ' ч назад';
  if (s < 30*86400) return Math.floor(s/86400) + ' дн назад';
  return new Date(ts).toLocaleDateString('ru-RU');
}
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast ' + type, 2400);
}
function roleChipHtml(role) {
  const cls = role==='owner'?'role-owner':role==='admin'?'role-admin':role==='moderator'?'role-mod':'role-user';
  return `<span class="role-chip ${cls}">${ROLE_LABELS[role]||role}</span>`;
}
function displayAuthor(u) {
  return u?.displayName || u?.username || 'гость';
}

function confirm2(title, txt, icon, onOk) {

  document.getElementById('cfTitle').textContent = title;
  document.getElementById('cfTxt').textContent = txt;

function openAuth() { document.getElementById('authOverlay').classList.add('open'); }
function closeAuth() { document.getElementById('authOverlay').classList.remove('open'); }
function authTab(t) {
  document.getElementById('atLogin').classList.toggle('active', t==='login');
  document.getElementById('atReg').classList.toggle('active', t==='reg');
  document.getElementById('apLogin').classList.toggle('active', t==='login');
  document.getElementById('apReg').classList.toggle('active', t==='reg');
}
function requireAuth(fn) {
  if (curUser) return fn();
  openAuth();
  toast('Сначала войди или зарегистрируйся', 'warn');
}

async function doLogin() {
  const username = document.getElementById('liUser').value.trim();
  const password = document.getElementById('liPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Заполни оба поля'; return; }
  try {
    const { user } = await api('/auth/login', { method:'POST', body:{ username, password } });
    curUser = user;
    closeAuth();
    document.getElementById('liUser').value = '';
    document.getElementById('liPass').value = '';
    toast('С возвращением, ' + user.displayName, 'ok');
    await loadAll();
  } catch (e) { errEl.textContent = e.message; }
}

async function doRegister() {
  const username = document.getElementById('rUser').value.trim();
  const displayName = document.getElementById('rDisp').value.trim() || username;
  const password = document.getElementById('rPass').value;
  const password2 = document.getElementById('rPass2').value;
  const errEl = document.getElementById('regErr');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Заполни обязательные поля'; return; }
  if (password !== password2) { errEl.textContent = 'Пароли не совпадают'; return; }
  try {
    const { user } = await api('/auth/register', { method:'POST', body:{ username, password, displayName } });
    curUser = user;
    closeAuth();
    toast('Аккаунт создан', 'ok');
    await loadAll();
  } catch (e) { errEl.textContent = e.message; }
}

async function doLogout() {
  try { await api('/auth/logout', { method:'POST' }); } catch {}
  curUser = null;
  closeUDrop();
  toast('Вы вышли', 'ok');
  await loadAll();
}

// ── HOME (анкеты) ───────────────────────────────────────────────
function renderHome() {
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  let list = profiles.slice();
  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.bio||'').toLowerCase().includes(q) ||
    (p.tags||[]).some(t => t.toLowerCase().includes(q))
  );
  list.sort((a,b) => (b.pinned-a.pinned) || (b.createdAt - a.createdAt));

  const adminBar = isMod() ? `<div class="quick-admin-panel">
    <b>⚡ Действия модератора</b>
    <span class="hint">Наведи на анкету: появятся ✏️ 📌 ⧉ 🗑️</span>
    ${isAdmin() ? `<button class="btn btn-secondary btn-sm" onclick="openSiteEditor()">🛠 Live-редактор</button>` : ''}
    <button class="btn btn-primary btn-sm" onclick="nav('create')">+ Анкета</button>
  </div>` : '';

  const cards = list.length ? list.map(p => {
    const adminControls = isMod() ? `<div class="pcard-admin-actions" onclick="event.stopPropagation()">
        <button class="pcard-admin-btn" title="Редактировать" onclick="adminEditProfile(${p.id})">✏️</button>
        <button class="pcard-admin-btn" title="${p.pinned?'Открепить':'Закрепить'}" onclick="quickTogglePin(${p.id})">📌</button>
        <button class="pcard-admin-btn" title="${p.hidden?'Показать':'Скрыть'}" onclick="quickToggleHide(${p.id})">${p.hidden?'👁':'🙈'}</button>
        <button class="pcard-admin-btn danger" title="Удалить" onclick="quickDeleteProfile(${p.id})">🗑️</button>
      </div>` : '';

    // Автор — показываем только если анкета не анонимная
    const authorMeta = p.anon
      ? `<span style="color:var(--muted);font-size:11px">🥷 Аноним · ${timeAgo(p.createdAt)}</span>`
      : p.authorName
        ? `<span class="author-link" style="font-size:11px" onclick="event.stopPropagation();openUserProfile(${p.ownerId})">${esc(p.authorName)}</span><span style="color:var(--muted);font-size:11px"> · ${timeAgo(p.createdAt)}</span>`
        : `<span style="color:var(--muted);font-size:11px">${timeAgo(p.createdAt)}</span>`;

    return `<div class="pcard${p.hidden?' is-hidden':''}" onclick="openProfile(${p.id})">
      ${adminControls}
      ${p.hidden?'<div class="admin-badge-mini">СКРЫТА</div>':''}
      ${p.anon?'<div class="admin-badge-mini" style="background:#5865f220;color:var(--accent2);border-color:#5865f240">🥷 АНОНИМНО</div>':''}
      ${p.pinned&&!isMod()?'<div class="pcard-pin">📌</div>':''}
      <div class="pcard-top">
        <div class="pcard-av" style="background:${esc(p.color)}40">${p.avatar?`<img src="${esc(p.avatar)}" style="width:44px;height:44px;border-radius:50%;object-fit:cover">`:esc(p.emoji||'👤')}</div>
        <div class="pcard-info">
          <div class="pcard-name">${esc(p.name)}</div>
          <div class="pcard-meta">${p.age?p.age+' лет · ':''}${authorMeta}</div>
          <div class="pcard-tags">${(p.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
        </div>
      </div>
      <div class="pcard-bio">${esc(p.bio||'')}</div>
    </div>`;
  }).join('') : `<div class="empty-state">
      <div class="icon">📋</div><h3>Анкет пока нет</h3>
      <div>${curUser?'Будь первым — нажми «Создать анкету»':'Войди, чтобы создать первую анкету'}</div>
    </div>`;

  return `<h1 class="page-title">📋 Анкеты</h1>${adminBar}<div class="profiles-grid">${cards}</div>`;
}

        <button class="pcard-admin-btn" title="${t.hidden?'Показать':'Скрыть'}" onclick="quickToggleHideTopic(${t.id})">${t.hidden?'👁':'🙈'}</button>
        <button class="pcard-admin-btn danger" title="Удалить" onclick="quickDeleteTopic(${t.id})">🗑️</button>

    return `<div class="thread-row${t.hidden?' is-hidden':''}" onclick="openTopic(${t.id})">

          <div class="thread-list">${rows}</div>`;
}

function updateAnonHints() {
  const anon = document.getElementById('cpAnon')?.checked;
  const show = document.getElementById('cpShowInProfile')?.checked;
  const hint = document.getElementById('cpStatusHint');
  if (!hint) return;
  if (anon && show) {
    hint.style.display = 'block';
    hint.style.borderColor = 'var(--yellow)';
    hint.style.color = 'var(--yellow)';
    hint.style.background = '#faa61a10';
    hint.textContent = '⚠️ Анкета анонимная, но будет видна в профиле без имени автора';
  } else if (anon && !show) {
    hint.style.display = 'block';
    hint.style.borderColor = '#5865f240';
    hint.style.color = 'var(--accent2)';
    hint.style.background = '#5865f210';
    hint.textContent = '🥷 Анкета полностью анонимная — не привязана к профилю';
  } else if (!anon && show) {
    hint.style.display = 'block';
    hint.style.borderColor = 'var(--green)';
    hint.style.background = '#3ba55d10';
    hint.style.color = 'var(--green)';
    hint.textContent = '✓ Анкета публичная — автор виден, отображается в профиле';
  } else {
    hint.style.display = 'block';
    hint.style.borderColor = 'var(--border)';
    hint.style.background = 'var(--bg3)';
    hint.style.color = 'var(--muted)';
    hint.textContent = 'Анкета публичная, но не отображается в профиле';
  }
}

// Оставляем старую функцию для совместимости
function toggleAnonHint() { updateAnonHints(); }

async function submitCreateProfile() {
  const name = document.getElementById('cpName').value.trim();
  const age  = +document.getElementById('cpAge').value || null;
  const emoji = document.getElementById('cpEmoji').value.trim() || '👤';
  const color = document.getElementById('cpColor').value || '#e8632a';
  const bio   = document.getElementById('cpBio').value.trim();
  const tags  = document.getElementById('cpTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const anon  = document.getElementById('cpAnon')?.checked || false;
  const showInProfile = document.getElementById('cpShowInProfile')?.checked ?? true;
  const errEl = document.getElementById('cpErr');
  errEl.textContent = '';
  if (!name) { errEl.textContent = 'Имя обязательно'; return; }
  try {
    await api('/profiles', { method:'POST', body:{ name, age, emoji, color, bio, tags, anon, showInProfile } });
    toast(anon ? '🥷 Анонимная анкета опубликована' : '✓ Анкета опубликована', 'ok');
    await loadProfiles();
    nav('home');
  } catch (e) { errEl.textContent = e.message; }
}

async function openProfile(id) {
  try {
    const data = await api('/profiles/' + id);
    curProfile = data;
    renderProfileModal();
    document.getElementById('profileOverlay').classList.add('open');
    socketJoinProfile(id);
  } catch (e) { toast(e.message, 'err'); }
}
function closeProfile() {
  if (curProfile) socketLeaveProfile(curProfile.profile.id);
  document.getElementById('profileOverlay').classList.remove('open');
  curProfile = null;
}

function avatarHtml(src, emoji, size='72px', cls='') {
  if (src) return `<img src="${esc(src)}" class="avatar-img ${cls}" style="width:${size};height:${size}" onerror="this.style.display='none'">`;
  return `<div class="pm-av" style="width:${size};height:${size};font-size:calc(${size} * .45)">${esc(emoji||'👤')}</div>`;
}

function renderProfileModal() {
  if (!curProfile) return;
  const p = curProfile.profile;
  // Для анонимных анкет ownerId скрыт, используем внутренний _ownerId если есть
  const realOwnerId = p._ownerId || p.ownerId;
  const isOwn = curUser && (realOwnerId === curUser.id);
  const canEdit = isOwn || isMod();
  const canDelete = isOwn || isMod();

  const anonBadge = p.anon
    ? `<span style="background:#5865f220;color:var(--accent2);border:1px solid #5865f240;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600">🥷 Анонимно</span>`
    : '';

  const adminBar = canEdit ? `<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">

    return `<div class="comment-item">
      ${cmAvHtml}

        ${canDel?`<div class="cm-actions"><button class="cm-act red" onclick="deleteComment(${c.id})">Удалить</button></div>`:''}

  const commentInput = curUser ? `
    <div id="cmAttachPreview"></div>
    <div class="comment-input-row">

        ? `<img src="${esc(curUser.avatar)}" class="avatar-img-sm" style="width:28px;height:28px;flex-shrink:0">`
        : `<div class="cm-av">${esc(curUser.emoji||'👤')}</div>`}

          <textarea class="comment-field" id="cmField" placeholder="Написать комментарий..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendComment()}"></textarea>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="img-btn" onclick="pickCommentImage()" title="Прикрепить фото">📎 Фото</button>
          <input type="file" id="cmImageInput" accept="image/*" style="display:none" onchange="previewCommentImage(this)">
        </div>
      </div>
      <button class="comment-send" onclick="sendComment()">→</button>
    </div>` : `<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px"><a onclick="openAuth()" style="cursor:pointer">Войди</a> чтобы оставить комментарий</div>`;

  document.getElementById('profileBody').innerHTML = `
    ${adminBar}
    <div class="profile-header-modal">
      ${avHtml}
      <div class="pm-info">
        <div class="pm-name">${esc(p.name)}</div>
        <div class="pm-sub">
          ${p.age?p.age+' лет · ':''}
          ${p.anon
            ? '<span style="color:var(--accent2)">🥷 Аноним</span> · '
            : p.authorName
              ? `<span class="author-link" onclick="openUserProfile(${p.ownerId})">${esc(p.authorName)}</span> · `
              : ''}
          ${timeAgo(p.createdAt)}
        </div>
        <div class="pm-tags" style="gap:5px;flex-wrap:wrap;display:flex">${anonBadge}${p.showInProfile?'':'<span style="font-size:10px;color:var(--muted);padding:1px 6px;background:var(--bg3);border-radius:3px;border:1px solid var(--border)">не в профиле</span>'}${(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      </div>
    </div>
    <div class="section-title">📝 О себе</div>
    <div class="about-box">${esc(p.bio||'Нет описания')}</div>
    ${photoGrid}
    <div class="section-title">💬 Комментарии (${(curProfile.comments||[]).length})</div>
    ${comments}
    ${commentInput}`;
}

// Загрузка аватарки анкеты
function uploadProfileAvatar(profileId) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = async () => {
    if (!inp.files[0]) return;
    const fd = new FormData();
    fd.append('avatar', inp.files[0]);
    try {
      const res = await fetch(`/api/profiles/${profileId}/avatar`, { method:'POST', credentials:'include', body:fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      const idx = profiles.findIndex(x=>x.id===profileId);
      if (idx>=0) profiles[idx] = data.profile;
      if (curProfile?.profile.id===profileId) { curProfile.profile=data.profile; renderProfileModal(); }
      toast('Аватарка обновлена', 'ok');
    } catch(e) { toast(e.message, 'err'); }
  };
  inp.click();
}

// Загрузка фото в галерею анкеты
function uploadProfilePhoto(profileId) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = async () => {
    if (!inp.files[0]) return;
    const fd = new FormData();
    fd.append('photo', inp.files[0]);
    try {
      const res = await fetch(`/api/profiles/${profileId}/photos`, { method:'POST', credentials:'include', body:fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      const idx = profiles.findIndex(x=>x.id===profileId);
      if (idx>=0) profiles[idx] = data.profile;
      if (curProfile?.profile.id===profileId) { curProfile.profile=data.profile; renderProfileModal(); }
      toast('Фото добавлено', 'ok');
    } catch(e) { toast(e.message, 'err'); }
  };
  inp.click();
}

async function deleteProfilePhoto(profileId, url) {
  try {
    const res = await fetch(`/api/profiles/${profileId}/photos`, { method:'DELETE', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    const idx = profiles.findIndex(x=>x.id===profileId);
    if (idx>=0) profiles[idx] = data.profile;
    if (curProfile?.profile.id===profileId) { curProfile.profile=data.profile; renderProfileModal(); }
    toast('Фото удалено', 'ok');
  } catch(e) { toast(e.message, 'err'); }
}

// Прикрепление фото к комментарию
let _cmImageFile = null;
function pickCommentImage() { document.getElementById('cmImageInput')?.click(); }
function previewCommentImage(input) {
  _cmImageFile = input.files[0] || null;
  const prev = document.getElementById('cmAttachPreview');
  if (!prev) return;
  if (_cmImageFile) {
    const url = URL.createObjectURL(_cmImageFile);
    prev.innerHTML = `<div class="img-attach-preview"><img src="${url}"><button class="rm" onclick="clearCommentImage()">✕</button></div>`;
  } else { prev.innerHTML=''; }
}
function clearCommentImage() {
  _cmImageFile = null;
  const inp = document.getElementById('cmImageInput');
  if (inp) inp.value='';
  const prev = document.getElementById('cmAttachPreview');
  if (prev) prev.innerHTML='';
}

async function sendComment() {
  if (!curProfile || !curUser) return;
  const text = (document.getElementById('cmField')?.value||'').trim();
  if (!text && !_cmImageFile) return;
  try {
    let newComment;
    if (_cmImageFile) {
      const fd = new FormData();
      fd.append('image', _cmImageFile);
      if (text) fd.append('text', text);
      const res = await fetch(`/api/profiles/${curProfile.profile.id}/comments/image`, { method:'POST', credentials:'include', body:fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      newComment = data.comment;
    } else {
      const data = await api(`/profiles/${curProfile.profile.id}/comments`, { method:'POST', body:{ text } });
      newComment = data.comment;
    }
    if (document.getElementById('cmField')) document.getElementById('cmField').value = '';
    clearCommentImage();
    // Добавляем комментарий локально сразу (не ждём сокет)
    if (newComment && !curProfile.comments.find(x => x.id === newComment.id)) {
      curProfile.comments.push(newComment);
      renderProfileModal();
      const mb = document.getElementById('profileBody');
      if (mb) mb.scrollTop = mb.scrollHeight;
    }
  } catch (e) { toast(e.message, 'err'); }
}

async function deleteComment(id) {
  try {
    await api('/comments/' + id, { method:'DELETE' });
    curProfile.comments = curProfile.comments.filter(x => x.id !== id);
    renderProfileModal();
    toast('Удалено', 'ok');
  } catch (e) { toast(e.message, 'err'); }
}

function updateEditHints() {
  const anon = document.getElementById('epAnon')?.checked;
  const show = document.getElementById('epShowInProfile')?.checked;
  const hint = document.getElementById('epStatusHint');
  if (!hint) return;
  if (anon && show) {
    hint.style.borderColor = 'var(--yellow)'; hint.style.color = 'var(--yellow)'; hint.style.background = '#faa61a10';
    hint.textContent = '⚠️ Анкета анонимная, но будет видна в профиле без имени автора';
  } else if (anon && !show) {
    hint.style.borderColor = '#5865f240'; hint.style.color = 'var(--accent2)'; hint.style.background = '#5865f210';
    hint.textContent = '🥷 Анкета полностью анонимная — не привязана к профилю';
  } else if (!anon && show) {
    hint.style.borderColor = 'var(--green)'; hint.style.background = '#3ba55d10'; hint.style.color = 'var(--green)';
    hint.textContent = '✓ Анкета публичная — автор виден, отображается в профиле';
  } else {
    hint.style.borderColor = 'var(--border)'; hint.style.background = 'var(--bg3)'; hint.style.color = 'var(--muted)';
    hint.textContent = 'Анкета публичная, но не отображается в профиле';
  }
}

async function submitEditProfile(id) {
  try {
    await api('/profiles/' + id, { method:'PATCH', body:{
      name:          document.getElementById('epName').value.trim(),
      age:           +document.getElementById('epAge').value || null,
      emoji:         document.getElementById('epEmoji').value.trim() || '👤',
      color:         document.getElementById('epColor').value,
      tags:          document.getElementById('epTags').value.split(',').map(s=>s.trim()).filter(Boolean),
      bio:           document.getElementById('epBio').value.trim(),
      anon:          document.getElementById('epAnon')?.checked || false,
      showInProfile: document.getElementById('epShowInProfile')?.checked ?? true,
    } });
    toast('Сохранено', 'ok');
    await loadProfiles();
    openProfile(id);
  } catch (e) { toast(e.message, 'err'); }
}

async function quickTogglePin(id) {
  const p = profiles.find(x => x.id === id) || curProfile?.profile;
  if (!p) return;
  try {
    await api('/profiles/' + id, { method:'PATCH', body:{ pinned: !p.pinned } });
    await loadProfiles(); render();
    if (curProfile?.profile.id === id) openProfile(id);
  } catch (e) { toast(e.message, 'err'); }
}
async function quickToggleHide(id) {
  const p = profiles.find(x => x.id === id) || curProfile?.profile;
  if (!p) return;
  try {
    await api('/profiles/' + id, { method:'PATCH', body:{ hidden: !p.hidden } });
    await loadProfiles(); render();
    if (curProfile?.profile.id === id) openProfile(id);
  } catch (e) { toast(e.message, 'err'); }
}
function quickDeleteProfile(id) {
  const p = profiles.find(x => x.id === id) || curProfile?.profile;
  confirm2('Удалить анкету?', `«${p?.name||''}» удалится навсегда.`, '🗑️', async () => {
    try {
      await api('/profiles/' + id, { method:'DELETE' });
      toast('Анкета удалена', 'ok');
      closeProfile();
      await loadProfiles(); render();
    } catch (e) { toast(e.message, 'err'); }
  });
}

function openCreateTopic() {
  if (!curUser) return openAuth();
  const ov = document.getElementById('topicOverlay');
  document.getElementById('topicBody').innerHTML = `
    <h3 style="margin-bottom:14px">Новая тема</h3>
    <div class="auth-err" id="ctErr"></div>
    <div class="fgroup"><label class="flabel">Заголовок</label><input class="finput" id="ctTitle" maxlength="120"></div>
    <div class="fgroup"><label class="flabel">Текст</label><textarea class="ftextarea" id="ctBody" maxlength="5000" style="min-height:140px"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="submitCreateTopic()">Опубликовать</button>`;
  ov.classList.add('open');
}
async function submitCreateTopic() {
  const title = document.getElementById('ctTitle').value.trim();
  const body = document.getElementById('ctBody').value.trim();
  const err = document.getElementById('ctErr');
  err.textContent = '';
  if (!title || !body) { err.textContent = 'Заполни оба поля'; return; }
  try {
    const { topic } = await api('/topics', { method:'POST', body:{ title, body } });
    toast('Тема создана', 'ok');
    await loadTopics();
    openTopic(topic.id);
  } catch (e) { err.textContent = e.message; }
}

async function openTopic(id) {
  try {
    const data = await api('/topics/' + id);
    curTopic = data;
    renderTopicModal();
    document.getElementById('topicOverlay').classList.add('open');
    socketJoinTopic(id);
  } catch (e) { toast(e.message, 'err'); }
}
function closeTopic() {
  if (curTopic) socketLeaveTopic(curTopic.topic.id);
  document.getElementById('topicOverlay').classList.remove('open');
  curTopic = null;
}

function renderTopicModal() {
  if (!curTopic) return;
  const t = curTopic.topic;
  const isOwn = curUser && t.userId === curUser.id;
  const canDelete = isOwn || isMod();
  const adminBar = (isOwn || isMod()) ? `<div class="tp-actions">
    ${isMod()?`<button class="btn btn-secondary btn-sm" onclick="quickTogglePinTopic(${t.id})">📌 ${t.pinned?'Открепить':'Закрепить'}</button>`:''}
    ${isMod()?`<button class="btn btn-secondary btn-sm" onclick="quickToggleHideTopic(${t.id})">${t.hidden?'👁 Показать':'🙈 Скрыть'}</button>`:''}
    ${canDelete?`<button class="btn btn-danger btn-sm" onclick="quickDeleteTopic(${t.id})">🗑️ Удалить тему</button>`:''}
  </div>` : '';

  const posts = (curTopic.posts || []).map(p => {
    const canDel = curUser && (p.userId === curUser.id || isMod());
    const isAnon = !!p.isAnonMode;
    const avHtml = isAnon
      ? `<div class="tp-av" style="background:#ed424520;font-size:20px">🛡️</div>`
      : p.userAvatar
        ? `<img src="${esc(p.userAvatar)}" class="avatar-img" style="width:52px;height:52px;margin:0 auto 6px;border-radius:50%;object-fit:cover" onerror="this.outerHTML='<div class=\\'tp-av\\'>${esc(p.userEmoji||'👤')}</div>'">`
        : `<div class="tp-av">${esc(p.userEmoji||'👤')}</div>`;
    const nameHtml = isAnon
      ? `<div class="tp-username" style="color:var(--red)">Анонимный<br>администратор</div>`
      : `<div class="tp-username"><span class="author-link" onclick="openUserProfile(${p.userId})">${esc(p.author)}</span></div>`;
    return `<div class="thread-post">
      <div class="tp-head">
        <div class="tp-sidebar">
          ${avHtml}
          ${nameHtml}
        </div>
        <div class="tp-body">
          <div class="tp-meta">${timeAgo(p.createdAt)}</div>
          ${p.text?`<div class="tp-content">${esc(p.text)}</div>`:''}
          ${p.image?`<img src="${esc(p.image)}" class="post-image" onclick="openLightbox('${esc(p.image)}')" loading="lazy">`:''}
        </div>
      </div>
      ${canDel?`<div class="tp-actions"><button class="btn btn-secondary btn-sm" onclick="deletePost(${p.id})">🗑️ Удалить</button></div>`:''}
    </div>`;
  }).join('');

  const replyForm = curUser ? `
    <div style="margin-top:14px">
      <textarea class="ftextarea" id="postField" placeholder="Написать ответ..." style="min-height:80px"></textarea>
      <div id="postAttachPreview"></div>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-primary btn-sm" onclick="sendPost()">Ответить</button>

let _postImageFile = null;
function pickPostImage() { document.getElementById('postImageInput')?.click(); }
function previewPostImage(input) {
  _postImageFile = input.files[0] || null;
  const prev = document.getElementById('postAttachPreview');
  if (!prev) return;
  if (_postImageFile) {
    const url = URL.createObjectURL(_postImageFile);
    prev.innerHTML = `<div class="img-attach-preview"><img src="${url}"><button class="rm" onclick="clearPostImage()">✕</button></div>`;
  } else { prev.innerHTML=''; }
}
function clearPostImage() {
  _postImageFile = null;
  const inp = document.getElementById('postImageInput');
  if (inp) inp.value='';
  const prev = document.getElementById('postAttachPreview');
  if (prev) prev.innerHTML='';
}

async function sendPost() {
  if (!curTopic || !curUser) return;
  const text = (document.getElementById('postField')?.value||'').trim();
  if (!text && !_postImageFile) return;
  try {
    let newPost;
    if (_postImageFile) {
      const fd = new FormData();
      fd.append('image', _postImageFile);
      if (text) fd.append('text', text);
      const res = await fetch(`/api/topics/${curTopic.topic.id}/posts/image`, { method:'POST', credentials:'include', body:fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      newPost = data.post;
    } else {
      const data = await api(`/topics/${curTopic.topic.id}/posts`, { method:'POST', body:{ text } });
      newPost = data.post;
    }
    if (document.getElementById('postField')) document.getElementById('postField').value = '';
    clearPostImage();
    // Добавляем пост локально сразу
    if (newPost && !curTopic.posts.find(x => x.id === newPost.id)) {
      curTopic.posts.push(newPost);
      renderTopicModal();
      const mb = document.getElementById('topicBody');
      if (mb) mb.scrollTop = mb.scrollHeight;
    }
  } catch (e) { toast(e.message, 'err'); }
}

async function deletePost(id) {
  try {
    await api('/posts/' + id, { method:'DELETE' });
    curTopic.posts = curTopic.posts.filter(x=>x.id!==id);
    renderTopicModal();
    await loadTopics();
  } catch (e) { toast(e.message, 'err'); }
}

async function quickTogglePinTopic(id) {
  const t = topics.find(x => x.id === id) || curTopic?.topic;
  try {
    await api('/topics/' + id, { method:'PATCH', body:{ pinned: !t.pinned } });
    await loadTopics(); render();
    if (curTopic?.topic.id === id) openTopic(id);
  } catch (e) { toast(e.message, 'err'); }
}
async function quickToggleHideTopic(id) {
  const t = topics.find(x => x.id === id) || curTopic?.topic;
  try {
    await api('/topics/' + id, { method:'PATCH', body:{ hidden: !t.hidden } });
    await loadTopics(); render();
    if (curTopic?.topic.id === id) openTopic(id);
  } catch (e) { toast(e.message, 'err'); }
}
function quickDeleteTopic(id) {
  const t = topics.find(x => x.id === id) || curTopic?.topic;
  confirm2('Удалить тему?', `«${t?.title||''}» удалится со всеми ответами.`, '🗑️', async () => {
    try {
      await api('/topics/' + id, { method:'DELETE' });
      toast('Тема удалена', 'ok');
      closeTopic();
      await loadTopics(); render();
    } catch (e) { toast(e.message, 'err'); }
  });
}

const SOCIAL_ICONS = { vk:'VK', tg:'TG', inst:'IG', discord:'DC', youtube:'YT', twitter:'TW', site:'🌐' };

        <div class="uprofile-av" style="border-color:var(--card)" onclick="uploadUserAvatar()">${avInner}</div>

  const socials = u.socials || {};

    const href = k==='vk'?`https://vk.com/${v}`:k==='tg'?`https://t.me/${v}`:k==='inst'?`https://instagram.com/${v}`:v;

            : '';

            <div class="pcard-top">
              <div class="pcard-av" style="background:${esc(p.color)}40">${p.avatar?`<img src="${esc(p.avatar)}" style="width:44px;height:44px;border-radius:50%;object-fit:cover">`:esc(p.emoji||'👤')}</div>

            </div>
            <div class="pcard-bio">${esc(p.bio||'')}</div>

  const editBtn = isMe

      ${u.status?`<div class="uprofile-status">${esc(u.status)}</div>`:''}

function uploadUserBanner() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = async () => {
    if (!inp.files[0]) return;
    const fd = new FormData();
    fd.append('banner', inp.files[0]);
    try {
      const res = await fetch('/api/auth/banner', { method:'POST', credentials:'include', body:fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      curUser = data.user;
      if (curUserProfile?.user.id === curUser.id) {
        curUserProfile.user = curUser;
        renderUserProfile();
      }
      toast('Баннер обновлён', 'ok');
    } catch(e) { toast(e.message, 'err'); }
  };
  inp.click();
}

let adminTab = 'users';
async function openAdmin() {
  if (!isMod()) return;
  document.getElementById('adminOverlay').classList.add('open');
  await renderAdmin();
}
function closeAdmin() { document.getElementById('adminOverlay').classList.remove('open'); }

async function renderAdmin() {
  const stats = await api('/stats');
  const tabs = [
    ['users', '👥 Пользователи'],
    ['profiles', '📋 Анкеты'],
    ['topics', '💬 Темы'],
  ];
  if (isAdmin()) tabs.push(['audit', '📜 Лог']);
  if (isAdmin()) tabs.push(['danger', '⚠ Опасные']);

  let body = `
    <div class="admin-stat-grid">
      <div class="astat"><div class="astat-n">${stats.users}</div><div class="astat-l">Юзеров</div></div>
      <div class="astat"><div class="astat-n">${stats.profiles}</div><div class="astat-l">Анкет</div></div>
      <div class="astat"><div class="astat-n">${stats.topics}</div><div class="astat-l">Тем</div></div>
      <div class="astat"><div class="astat-n">${stats.posts}</div><div class="astat-l">Сообщений</div></div>
    </div>
    <div class="atabs">${tabs.map(([k,l])=>`<button class="atab2${adminTab===k?' active':''}" onclick="adminTab='${k}';renderAdmin()">${l}</button>`).join('')}</div>
    <div id="adminTabBody">Загрузка...</div>`;
  document.getElementById('adminBody').innerHTML = body;
  if (adminTab === 'users') renderAdminUsers();
  else if (adminTab === 'profiles') renderAdminProfiles();
  else if (adminTab === 'topics') renderAdminTopics();
  else if (adminTab === 'audit') renderAdminAudit();
  else if (adminTab === 'danger') renderAdminDanger();
}

async function renderAdminUsers() {
  try {
    const { users } = await api('/users');
    const rows = users.map(u => {
      const canEditRole = isOwner() && u.role !== 'owner' && u.id !== curUser.id;
      const canModerate = u.role !== 'owner' && u.id !== curUser.id && rolerank(u) < rolerank(curUser);
      const roleSel = canEditRole ? `<select class="role-sel" onchange="setUserRole(${u.id}, this.value)">
        ${['user','moderator','admin'].map(r=>`<option value="${r}"${u.role===r?' selected':''}>${ROLE_LABELS[r]}</option>`).join('')}
      </select>` : roleChipHtml(u.role);
      const banBtn = canModerate ? `<button class="act-btn ${u.banned?'g':'y'}" onclick="banUser(${u.id}, ${!u.banned})">${u.banned?'Разбанить':'Бан'}</button>` : '';
      const delBtn = isOwner() && u.role !== 'owner' && u.id !== curUser.id ? `<button class="act-btn d" onclick="deleteUser(${u.id}, '${esc(u.username)}')">Удалить</button>` : '';
      return `<tr>
        <td>${esc(u.emoji||'👤')} <b>${esc(u.displayName)}</b><br><span style="color:var(--muted);font-size:11px">@${esc(u.username)}</span></td>
        <td>${roleSel}</td>
        <td>${u.banned?'<span style="color:var(--red)">забанен</span>':'<span style="color:var(--green)">активен</span>'}</td>
        <td>${timeAgo(u.lastSeen)}</td>
        <td><div class="td-actions">${banBtn}${delBtn}</div></td>
      </tr>`;
    }).join('');
    document.getElementById('adminTabBody').innerHTML = `<div class="atable-wrap"><table class="atable">
      <thead><tr><th>Юзер</th><th>Роль</th><th>Статус</th><th>Активность</th><th>Действия</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  } catch (e) { document.getElementById('adminTabBody').innerHTML = '<div class="empty-state">Ошибка: ' + esc(e.message) + '</div>'; }
}

async function setUserRole(id, role) {
  try {
    await api(`/users/${id}/role`, { method:'POST', body:{ role } });
    toast('Роль изменена', 'ok');
    renderAdminUsers();
  } catch (e) { toast(e.message, 'err'); renderAdminUsers(); }
}
async function banUser(id, banned) {
  try {
    await api(`/users/${id}/ban`, { method:'POST', body:{ banned } });
    toast(banned?'Забанен':'Разбанен', 'ok');
    renderAdminUsers();
  } catch (e) { toast(e.message, 'err'); }
}
function deleteUser(id, name) {
  confirm2('Удалить пользователя?', `@${name} удалится навсегда.`, '⚠️', async () => {
    try { await api('/users/' + id, { method:'DELETE' }); toast('Удалён', 'ok'); renderAdminUsers(); }
    catch (e) { toast(e.message, 'err'); }
  });
}

    return `<tr>

        ${realAuthor}
        <div style="margin-top:3px">${statusBadges}</div>

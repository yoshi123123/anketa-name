// ════════════════════════════════════════════════════════════════════
//  SOCKET.IO — real-time
// ════════════════════════════════════════════════════════════════════
let socket = null;

function initSocket() {
  // Берём JWT из cookie для авторизации сокета
  const token = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('token='))?.split('=')[1] || '';
  socket = io({ auth: { token }, reconnectionDelay: 1000, reconnectionAttempts: Infinity });

  socket.on('connect', () => {
    console.log('[ws] connected', socket.id);
    // При реконнекте снова вступаем в комнаты
    if (curProfile) socketJoinProfile(curProfile.profile.id);
    if (curTopic) socketJoinTopic(curTopic.topic.id);
  });
  socket.on('disconnect', () => console.log('[ws] disconnected'));

  // Новая анкета — добавить в список без перезагрузки
  socket.on('profile:created', p => {
    if (!profiles.find(x => x.id === p.id)) {
      profiles.unshift(p);
      if (curPage === 'home') render();
    }
    loadStats();
  });

  // Анкета обновлена (пин, скрытие, редактирование)
  socket.on('profile:updated', p => {
    const idx = profiles.findIndex(x => x.id === p.id);
    if (idx >= 0) profiles[idx] = p; else profiles.unshift(p);
    if (curPage === 'home') render();
    // Если эта анкета открыта в модале — обновить шапку
    if (curProfile?.profile.id === p.id) {
      curProfile.profile = p;
      renderProfileModal();
    }
  });

  // Анкета удалена
  socket.on('profile:deleted', ({ id }) => {
    profiles = profiles.filter(x => x.id !== id);
    if (curPage === 'home') render();
    if (curProfile?.profile.id === id) closeProfile();
    loadStats();
  });

  // Новый комментарий к открытой анкете
  socket.on('comment:new', c => {
    if (!curProfile || curProfile.profile.id !== c.profile_id) return;
    if (curProfile.comments.find(x => x.id === c.id)) return; // дубль
    curProfile.comments.push(c);
    renderProfileModal();
    // Автоскролл вниз в модале
    const mb = document.getElementById('profileBody');
    if (mb) mb.scrollTop = mb.scrollHeight;
  });

  // Комментарий удалён
  socket.on('comment:deleted', ({ id }) => {
    if (!curProfile) return;
    curProfile.comments = curProfile.comments.filter(x => x.id !== id);
    renderProfileModal();
  });

  // Новая тема форума
  socket.on('topic:created', t => {
    if (!topics.find(x => x.id === t.id)) {
      topics.unshift(t);
      if (curPage === 'forum') render();
    }
    loadStats();
  });

  // Тема обновлена (пин, скрытие)
  socket.on('topic:updated', t => {
    const idx = topics.findIndex(x => x.id === t.id);
    if (idx >= 0) topics[idx] = t; else topics.unshift(t);
    if (curPage === 'forum') render();
  });

  // Тема удалена
  socket.on('topic:deleted', ({ id }) => {
    topics = topics.filter(x => x.id !== id);
    if (curPage === 'forum') render();
    if (curTopic?.topic.id === id) closeTopic();
    loadStats();
  });

  // Обновился счётчик ответов у темы
  socket.on('topic:posts_count', ({ topicId, count }) => {
    const t = topics.find(x => x.id === topicId);
    if (t) { t.postsCount = count; if (curPage === 'forum') render(); }
  });

  // Новый пост в открытой теме
  socket.on('post:new', p => {
    if (!curTopic || curTopic.topic.id !== p.topic_id) return;
    if (curTopic.posts.find(x => x.id === p.id)) return; // дубль
    curTopic.posts.push(p);
    renderTopicModal();
    const mb = document.getElementById('topicBody');
    if (mb) mb.scrollTop = mb.scrollHeight;
  });

  // Пост удалён в открытой теме
  socket.on('post:deleted', ({ id }) => {
    if (!curTopic) return;
    curTopic.posts = curTopic.posts.filter(x => x.id !== id);
    renderTopicModal();
  });

  // Настройки сайта изменились (цвет акцента, название и т.д.)
  socket.on('settings:updated', upd => {
    Object.assign(siteSettings, upd);
    renderHeader();
    render();
  });

  // Роль текущего юзера изменилась — перезагрузить его данные
  socket.on('user:role_changed', async ({ userId }) => {
    if (curUser && curUser.id === userId) {
      await loadMe();
      renderHeader();
      render();
      toast('Твоя роль была изменена', 'warn');
    }
  });

  // Обновить статистику в сайдбаре
  socket.on('stats:update', () => loadStats());
}

// Подписываем сокет на комнату конкретной анкеты
function socketJoinProfile(id) {
  if (!socket) return;
  if (socket.connected) socket.emit('join:profile', id);
  else socket.once('connect', () => socket.emit('join:profile', id));
}
function socketLeaveProfile(id) { if (socket) socket.emit('leave:profile', id); }
function socketJoinTopic(id) {
  if (!socket) return;
  if (socket.connected) socket.emit('join:topic', id);
  else socket.once('connect', () => socket.emit('join:topic', id));
}
function socketLeaveTopic(id)  { if (socket) socket.emit('leave:topic', id); }

let pendingFriendRequests = 0; // счётчик входящих заявок

function friendAvHtml(u, size='38px') {
  if (u.avatar) return `<div class="friend-av" style="width:${size};height:${size}"><img src="${esc(u.avatar)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:16px">${esc(u.emoji||'👤')}</div></div>`;
  return `<div class="friend-av" style="width:${size};height:${size}">${esc(u.emoji||'👤')}</div>`;
}

// Кнопка управления дружбой — показывается в профиле пользователя
async function renderFriendButton(userId) {
  if (!curUser || curUser.id === userId) return '';
  try {
    const { status } = await api(`/friends/status/${userId}`);
    return friendButtonHtml(userId, status);
  } catch { return ''; }
}

function friendButtonHtml(userId, status) {
  switch(status) {
    case 'none':
      return `<button class="friend-btn friend-btn-add" onclick="friendAction('request',${userId})">➕ Добавить в друзья</button>`;
    case 'pending_sent':
      return `<button class="friend-btn friend-btn-pending" onclick="friendAction('cancel',${userId})">⏳ Заявка отправлена · Отменить</button>`;
    case 'pending_received':
      return `<div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="friend-btn friend-btn-accept" onclick="friendAction('accept',${userId})">✓ Принять заявку</button>
        <button class="friend-btn" style="background:var(--card2);border:1px solid var(--border);color:var(--text2)" onclick="friendAction('decline',${userId})">✕ Отклонить</button>
      </div>`;
    case 'friends':
      return `<div class="friend-actions-drop" id="fad_${userId}">
        <button class="friend-btn friend-btn-friends" onclick="toggleFriendMenu(${userId})">✓ В друзьях ▾</button>
        <div class="friend-actions-menu" id="fam_${userId}">
          <button class="friend-menu-item" onclick="closeFriendMenu(${userId});openUserProfile(${userId})">👤 Профиль</button>
          <button class="friend-menu-item" onclick="closeFriendMenu(${userId});openDmChat(${userId})">💬 Написать</button>
          <button class="friend-menu-item red" onclick="closeFriendMenu(${userId});friendAction('remove',${userId})">👎 Удалить из друзей</button>
          <button class="friend-menu-item red" onclick="closeFriendMenu(${userId});friendAction('block',${userId})">🚫 Заблокировать</button>
        </div>
      </div>`;
    case 'blocked_by_me':
      return `<button class="friend-btn friend-btn-blocked" onclick="friendAction('unblock',${userId})">🚫 Заблокирован · Разблокировать</button>`;
    case 'blocked_by_them':
      return `<button class="friend-btn friend-btn-blocked" disabled>🚫 Недоступно</button>`;
    default: return '';
  }
}

function toggleFriendMenu(uid) {
  const m = document.getElementById('fam_'+uid);
  if (!m) return;
  m.classList.toggle('open');
  document.addEventListener('click', function closer(e) {
    if (!e.target.closest('#fad_'+uid)) { m.classList.remove('open'); document.removeEventListener('click',closer); }
  });
}
function closeFriendMenu(uid) { document.getElementById('fam_'+uid)?.classList.remove('open'); }

async function friendAction(action, userId) {
  const METHODS = { request:'POST', cancel:'POST', accept:'POST', decline:'POST', remove:'DELETE', block:'POST', unblock:'POST' };
  const PATHS   = { request:`/friends/request/${userId}`, cancel:`/friends/cancel/${userId}`, accept:`/friends/accept/${userId}`, decline:`/friends/decline/${userId}`, remove:`/friends/${userId}`, block:`/friends/block/${userId}`, unblock:`/friends/unblock/${userId}` };
  try {
    const { status } = await api(PATHS[action], { method: METHODS[action] });
    toast(
      action==='request' ? 'Заявка отправлена' :
      action==='accept'  ? '✓ Вы теперь друзья!' :
      action==='decline' ? 'Заявка отклонена' :
      action==='cancel'  ? 'Заявка отменена' :
      action==='remove'  ? 'Удалён из друзей' :
      action==='block'   ? 'Пользователь заблокирован' :
      action==='unblock' ? 'Разблокирован' : 'Готово',
      action==='accept' ? 'ok' : ''
    );
    // Обновляем кнопку в открытом профиле
    const btn = document.getElementById('friendBtnWrap_'+userId);
    if (btn) btn.innerHTML = friendButtonHtml(userId, status);
    // Обновляем счётчик если принял/отклонил
    if (action==='accept'||action==='decline') loadFriendRequestCount();
  } catch(e) { toast(e.message,'err'); }
}

// Загрузить счётчик входящих заявок
async function loadFriendRequestCount() {
  if (!curUser) return;
  try {
    const { requests } = await api('/friends/requests/incoming');
    pendingFriendRequests = requests.length;
    const dot  = document.getElementById('friendsNotifDot');
    const badge = document.getElementById('hdrFriendsBadge');
    if (dot)  { dot.classList.toggle('show', pendingFriendRequests > 0); }
    if (badge) { badge.style.display = pendingFriendRequests>0?'':'none'; badge.textContent = pendingFriendRequests; }
  } catch {}
}

// ── Модал «Мои друзья» ────────────────────────────────────────────
let friendsTab = 'friends';

async function openFriendsModal() {
  if (!curUser) return;
  document.getElementById('friendsOverlay').classList.add('open');
  await renderFriendsModal();
}

async function renderFriendsModal() {
  const tabs = [
    ['search','🔍 Поиск'],
    ['friends','👥 Друзья'],
    ['chats','💬 Чаты'],
    ['incoming','📩 Заявки'],
    ['outgoing','📤 Исходящие'],
    ['blocked','🚫 Блокировки'],
    ['privacy','⚙ Приватность'],
  ];
  const tabBar = `<div class="atabs" style="margin-bottom:14px">
    ${tabs.map(([k,l])=>`<button class="atab2${friendsTab===k?' active':''}" onclick="friendsTab='${k}';renderFriendsModal()">${l}${k==='incoming'&&pendingFriendRequests>0?` <span class="friend-badge-count">${pendingFriendRequests}</span>`:''}</button>`).join('')}
  </div>`;

  let content = '<div style="color:var(--muted);text-align:center;padding:24px">Загрузка...</div>';
  document.getElementById('friendsBody').innerHTML = tabBar + content;

  try {
    if (friendsTab === 'search') {
      content = `<div style="margin-bottom:12px">
        <input id="friendSearchInput" class="input" placeholder="Поиск по @юзернейму..." style="width:100%;box-sizing:border-box" oninput="debouncedFriendSearch()" autofocus>
      </div>
      <div id="friendSearchResults"><div class="empty-state"><div class="icon">🔍</div><h3>Введи имя пользователя</h3></div></div>`;
    }
    else if (friendsTab === 'chats') {
      const { conversations } = await api('/dm/conversations');
      if (!conversations.length) {
        content = '<div class="empty-state"><div class="icon">💬</div><h3>Нет диалогов</h3><div>Напиши другу через его профиль</div></div>';
      } else {
        content = `<div class="friends-list">${conversations.map(u=>`
          <div class="friend-row" onclick="openDmChat(${u.id})" style="cursor:pointer">
            ${friendAvHtml(u)}
            <div class="friend-info" style="flex:1;min-width:0">
              <div class="friend-name">${esc(u.displayName)} ${u.unread>0?`<span style="background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:100px">${u.unread}</span>`:''}</div>
              <div class="friend-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.lastText?esc(u.lastText.slice(0,50)):'Нет сообщений'}</div>
            </div>
          </div>`).join('')}</div>`;
      }
    }
    else if (friendsTab === 'friends') {
      const { friends, hidden } = await api(`/friends/${curUser.id}`);
      if (hidden) { content = '<div class="empty-state">Список друзей скрыт</div>'; }
      else if (!friends.length) { content = '<div class="empty-state"><div class="icon">👥</div><h3>Друзей пока нет</h3><div>Добавь первого — зайди в профиль пользователя</div></div>'; }
      else {
        content = `<div class="friends-list">${friends.map(u=>`
          <div class="friend-row" onclick="document.getElementById('friendsOverlay').classList.remove('open');openUserProfile(${u.id})">
            ${friendAvHtml(u)}
            <div class="friend-info">
              <div class="friend-name">${esc(u.displayName)}</div>
              <div class="friend-sub">@${esc(u.username)} · в друзьях с ${new Date(u.friendSince).toLocaleDateString('ru-RU')}</div>
            </div>
            <button class="btn btn-secondary btn-sm" style="flex-shrink:0" onclick="event.stopPropagation();friendAction('remove',${u.id}).then(()=>renderFriendsModal())">Удалить</button>
          </div>`).join('')}</div>`;
      }
    }
    else if (friendsTab === 'incoming') {
      const { requests } = await api('/friends/requests/incoming');
      if (!requests.length) { content = '<div class="empty-state"><div class="icon">📩</div><h3>Входящих заявок нет</h3></div>'; }
      else {
        content = `<div class="friends-list">${requests.map(u=>`
          <div class="friend-row">
            ${friendAvHtml(u)}
            <div class="friend-info">
              <div class="friend-name">${esc(u.displayName)}</div>
              <div class="friend-sub">@${esc(u.username)} · ${timeAgo(u.requestAt)}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="btn btn-primary btn-sm" onclick="friendAction('accept',${u.id}).then(()=>renderFriendsModal())">✓</button>
              <button class="btn btn-secondary btn-sm" onclick="friendAction('decline',${u.id}).then(()=>renderFriendsModal())">✕</button>
            </div>
          </div>`).join('')}</div>`;
      }
    }
    else if (friendsTab === 'outgoing') {
      const { requests } = await api('/friends/requests/outgoing');
      if (!requests.length) { content = '<div class="empty-state"><div class="icon">📤</div><h3>Исходящих заявок нет</h3></div>'; }
      else {
        content = `<div class="friends-list">${requests.map(u=>`
          <div class="friend-row">
            ${friendAvHtml(u)}
            <div class="friend-info">
              <div class="friend-name">${esc(u.displayName)}</div>
              <div class="friend-sub">@${esc(u.username)} · ${timeAgo(u.requestAt)}</div>
            </div>
            <button class="btn btn-secondary btn-sm" style="flex-shrink:0" onclick="friendAction('cancel',${u.id}).then(()=>renderFriendsModal())">Отменить</button>
          </div>`).join('')}</div>`;
      }
    }
    else if (friendsTab === 'blocked') {
      const { blocked } = await api('/friends/blocked/list');
      if (!blocked.length) { content = '<div class="empty-state"><div class="icon">🚫</div><h3>Список пуст</h3></div>'; }
      else {
        content = `<div class="friends-list">${blocked.map(u=>`
          <div class="friend-row">
            ${friendAvHtml(u)}
            <div class="friend-info">
              <div class="friend-name">${esc(u.displayName)}</div>
              <div class="friend-sub">@${esc(u.username)}</div>
            </div>
            <button class="btn btn-secondary btn-sm" style="flex-shrink:0;color:var(--green)" onclick="friendAction('unblock',${u.id}).then(()=>renderFriendsModal())">Разблокировать</button>
          </div>`).join('')}</div>`;
      }
    }
    else if (friendsTab === 'privacy') {
      const privacy = curUser.friendsPrivacy || 'all';
      content = `
        <div style="margin-bottom:16px">
          <div class="flabel" style="margin-bottom:8px">Кто видит список моих друзей</div>
          ${[['all','🌐 Все пользователи'],['friends','👥 Только друзья'],['none','🔒 Никто (скрыт)']].map(([v,l])=>`
            <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${privacy===v?'var(--card2)':'var(--bg3)'};border:1px solid ${privacy===v?'var(--accent)':'var(--border)'};border-radius:var(--r);margin-bottom:6px;cursor:pointer">
              <input type="radio" name="fprivacy" value="${v}" ${privacy===v?'checked':''} style="accent-color:var(--accent)">
              <span style="font-size:13px;color:var(--white)">${l}</span>
            </label>`).join('')}
          <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="saveFriendsPrivacy()">Сохранить</button>
        </div>`;
    }
  } catch(e) { content = `<div class="empty-state">Ошибка: ${esc(e.message)}</div>`; }

  document.getElementById('friendsBody').innerHTML = tabBar + content;
}

async function saveFriendsPrivacy() {
  const sel = document.querySelector('input[name="fprivacy"]:checked');
  if (!sel) return;
  try {
    await api('/friends/privacy', { method:'PATCH', body:{ privacy: sel.value } });
    curUser.friendsPrivacy = sel.value;
    toast('Приватность обновлена', 'ok');
    renderFriendsModal();
  } catch(e) { toast(e.message,'err'); }
}

// ── Socket.io события друзей ──────────────────────────────────────
// ── DM CHAT ──────────────────────────────────────────────────────────
let dmUserId = null, dmUserName = '';
async function openDmChat(userId) {
  dmUserId = userId;
  document.getElementById('friendsOverlay').classList.remove('open');
  document.getElementById('dmOverlay').classList.add('open');
  document.getElementById('dmMessages').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px">Загрузка...</div>';
  // Получаем имя пользователя
  try {
    const { user } = await api(`/users/${userId}/public`);
    document.getElementById('dmTitle').textContent = '💬 ' + esc(user.displayName || user.username);
  } catch {}
  const { messages } = await api(`/dm/${userId}`);
  renderDmMessages(messages);
  document.getElementById('dmInput').focus();
}
function renderDmMessages(msgs) {
  const el = document.getElementById('dmMessages');
  if (!el) return;
  el.innerHTML = msgs.length ? msgs.map(m => {
    const mine = m.from_id === curUser?.id;
    const av = m.avatar ? `<img src="${esc(m.avatar)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0">` : `<div style="width:28px;height:28px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">${esc(m.emoji||'👤')}</div>`;
    return `<div style="display:flex;gap:8px;align-items:flex-end;${mine?'flex-direction:row-reverse':''}">
      ${av}
      <div style="max-width:70%">
        <div style="background:${mine?'var(--accent)':'var(--card2)'};color:${mine?'#fff':'var(--text)'};padding:8px 12px;border-radius:${mine?'16px 16px 4px 16px':'16px 16px 16px 4px'};font-size:14px;word-break:break-word">${esc(m.text)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;text-align:${mine?'right':'left'}">${new Date(m.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>`;
  }).join('') : '<div style="text-align:center;color:var(--muted);padding:24px">Напиши первым!</div>';
  el.scrollTop = el.scrollHeight;
}
async function sendDm() {
  const inp = document.getElementById('dmInput');
  const text = inp.value.trim();
  if (!text || !dmUserId) return;
  inp.value = '';
  try { await api(`/dm/${dmUserId}`, { method:'POST', body:{ text } }); }
  catch(e) { toast(e.message, 'err'); inp.value = text; }
}

let friendSearchTimer = null;
function debouncedFriendSearch() {
  clearTimeout(friendSearchTimer);
  friendSearchTimer = setTimeout(doFriendSearch, 350);
}
async function doFriendSearch() {
  const q = (document.getElementById('friendSearchInput')?.value || '').trim();
  const res = document.getElementById('friendSearchResults');
  if (!res) return;
  if (!q) { res.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>Введи имя пользователя</h3></div>'; return; }
  res.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted)">Поиск...</div>';
  try {
    const users = await api(`/users/search?q=${encodeURIComponent(q)}`);
    if (!users.length) { res.innerHTML = '<div class="empty-state"><div class="icon">😶</div><h3>Никого не найдено</h3></div>'; return; }
    res.innerHTML = `<div class="friends-list">${users.map(u => `
      <div class="friend-row" onclick="document.getElementById('friendsOverlay').classList.remove('open');openUserProfile(${u.id})">
        ${friendAvHtml(u)}
        <div class="friend-info">
          <div class="friend-name">${esc(u.displayName)}</div>
          <div class="friend-sub">@${esc(u.username)}</div>
        </div>
        <div id="fsBtn_${u.id}">${u.id === curUser?.id ? '' : `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();friendSearchAdd(${u.id})">➕</button>`}</div>
      </div>`).join('')}</div>`;
  } catch(e) { res.innerHTML = `<div class="empty-state">${esc(e.message)}</div>`; }
}
async function friendSearchAdd(userId) {
  try {
    await friendAction('request', userId);
    const btn = document.getElementById(`fsBtn_${userId}`);
    if (btn) btn.innerHTML = '<span style="color:var(--green);font-size:12px">✓ Отправлено</span>';
  } catch(e) { toast(e.message, 'err'); }
}

function initFriendSockets() {
  if (!socket) return;
  socket.on('friend:request', ({ user: u }) => {
    pendingFriendRequests++;
    const dot  = document.getElementById('friendsNotifDot');
    const badge = document.getElementById('hdrFriendsBadge');
    if (dot) dot.classList.add('show');
    if (badge) { badge.style.display=''; badge.textContent=pendingFriendRequests; }
    toast(`📩 ${esc(u.displayName)} хочет добавить тебя в друзья`, 'ok');
  });
  socket.on('friend:accepted', ({ user: u }) => {
    toast(`✓ ${esc(u.displayName)} принял(а) заявку в друзья!`, 'ok');
  });
  socket.on('friend:removed', () => {
    loadFriendRequestCount();
  });
  socket.on('dm:message', (msg) => {
    if (document.getElementById('dmOverlay').classList.contains('open') && (msg.from_id === dmUserId || msg.to_id === dmUserId)) {
      const el = document.getElementById('dmMessages');
      const mine = msg.from_id === curUser?.id;
      const av = msg.avatar ? `<img src="${esc(msg.avatar)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0">` : `<div style="width:28px;height:28px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">${esc(msg.emoji||'👤')}</div>`;
      el.insertAdjacentHTML('beforeend', `<div style="display:flex;gap:8px;align-items:flex-end;${mine?'flex-direction:row-reverse':''}">
        ${av}
        <div style="max-width:70%">
          <div style="background:${mine?'var(--accent)':'var(--card2)'};color:${mine?'#fff':'var(--text)'};padding:8px 12px;border-radius:${mine?'16px 16px 4px 16px':'16px 16px 16px 4px'};font-size:14px;word-break:break-word">${esc(msg.text)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;text-align:${mine?'right':'left'}">${new Date(msg.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>`);
      el.scrollTop = el.scrollHeight;
      if (!mine) api(`/dm/${msg.from_id}`); // mark as read
    } else if (!document.getElementById('dmOverlay').classList.contains('open') && msg.from_id !== curUser?.id) {
      toast(`💬 ${esc(msg.display_name||msg.username)}: ${esc(msg.text.slice(0,40))}`);
    }
  });
}

// ════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════
loadAll().then(() => { initSocket(); initFriendSockets(); if (curUser) loadFriendRequestCount(); });
</script>
